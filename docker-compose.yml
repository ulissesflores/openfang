version: "3.8"
services:
  openfang:
    build: .
    ports:
      - "4200:4200"
    volumes:
      - openfang-data:/root/.openfang/data
      - ./config.production.toml:/root/.openfang/config.toml:ro
    environment:
      - OPENFANG_HOME=/root/.openfang
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
    restart: unless-stopped

volumes:
  openfang-data:
